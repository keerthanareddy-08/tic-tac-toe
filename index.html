<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>TIC TAC TOE</h1>
        <div class="game-info">
            <div class="player-info">
                <h2>Player: <span id="playerSymbol">X</span></h2>
                <p>Wins: <span id="playerWins">0</span></p>
            </div>
            <div class="vs">VS</div>
            <div class="computer-info">
                <h2>Computer: <span id="computerSymbol">O</span></h2>
                <p>Wins: <span id="computerWins">0</span></p>
            </div>
        </div>

        <div class="game-board" id="gameBoard">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div>
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div>
            <div class="cell" data-index="8"></div>
        </div>

        <div class="game-status" id="gameStatus">Your Turn (X)</div>

        <div class="buttons">
            <button id="newGameBtn" class="btn">New Game</button>
            <button id="resetScoreBtn" class="btn">Reset Score</button>
        </div>

        <div class="instructions">
            <p><strong>How to Play:</strong> Click on any empty cell to place your mark (X)</p>
            <p>First to get three marks in a row, column, or diagonal wins!</p>
            <p>Computer will automatically play as O</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
